name: CI
on: [push, pull_request]

jobs:
  test-install-container:
    runs-on: ubuntu-latest
    container:
      image: node:20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned version (Docker container job)
        uses: ./
        id: install-container
        with:
          version: 'v5.6.0'

      - name: Verify install works inside container
        shell: bash
        run: |
          datadog-ci version
          [[ "${{ steps.install-container.outputs.version }}" == "v5.6.0" ]]

  test-install-container-wget:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install wget (no curl in this image)
        shell: sh
        run: apt-get update && apt-get install -y --no-install-recommends wget ca-certificates

      - name: Install latest major version (wget-only container)
        uses: ./
        id: install-wget
        with:
          version: 'v5'

      - name: Verify install works with wget
        shell: bash
        run: |
          datadog-ci version
          [[ "${{ steps.install-wget.outputs.version }}" =~ ^v5\. ]]

  test-resolve-version-jq:
    name: "Resolve version (jq)"
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install curl and jq
        shell: sh
        run: apt-get update && apt-get install -y --no-install-recommends curl jq ca-certificates

      - name: Verify jq is available
        shell: bash
        run: jq --version

      - name: Install latest major version (jq path)
        uses: ./
        id: install
        with:
          version: 'v5'

      - name: Verify resolved version
        shell: bash
        run: |
          datadog-ci version
          [[ "${{ steps.install.outputs.version }}" =~ ^v5\. ]]

  test-resolve-version-awk:
    name: "Resolve version (awk fallback)"
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install curl without jq
        shell: sh
        run: apt-get update && apt-get install -y --no-install-recommends curl ca-certificates

      - name: Verify jq is NOT available
        shell: bash
        run: |
          if command -v jq &>/dev/null; then
            echo "::error::jq should not be installed for this test"
            exit 1
          fi

      - name: Install latest major version (awk fallback path)
        uses: ./
        id: install
        with:
          version: 'v5'

      - name: Verify resolved version
        shell: bash
        run: |
          datadog-ci version
          [[ "${{ steps.install.outputs.version }}" =~ ^v5\. ]]

  test-resolve-version-error-handling:
    name: "Resolve version error handling"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify jq is available
        shell: bash
        run: jq --version

      - name: Run resolver unit tests
        shell: bash
        run: bash test/resolve-version.sh

  test-install:
    strategy:
      fail-fast: false
      matrix:
        # Matches the OS/arch combinations used by the datadog-ci release pipeline:
        # ubuntu-latest (Linux x64), ubuntu-24.04-arm (Linux ARM64),
        # macos-latest (macOS ARM64), macos-latest-large (macOS x64), windows-latest (Win x64)
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-latest-large, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Test 1: Install with default version (v5)
      - name: Install default version
        uses: ./
        id: install-default

      - name: Verify default install
        shell: bash
        run: |
          datadog-ci version
          echo "Installed version: ${{ steps.install-default.outputs.version }}"
          # Verify version output is not empty and starts with 'v5.'
          [[ "${{ steps.install-default.outputs.version }}" == v5.* ]]

      # Test 2: Install with a pinned version
      - name: Install pinned version
        uses: ./
        id: install-pinned
        with:
          version: 'v5.6.0'

      - name: Verify pinned install
        shell: bash
        run: |
          version=$(datadog-ci version)
          [[ "$version" == *"5.6.0"* ]]

      # Test 3: Verify re-installing the same version works
      - name: Install same pinned version again
        uses: ./
        with:
          version: 'v5.6.0'
